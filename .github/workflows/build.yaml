name: README build
on:
  push:
    branches:
      - main
  workflow_dispatch:  # Permite que você execute o workflow manualmente na aba Actions
  schedule:
    - cron: "0 4 * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Atualizado de v2 para v4
        with:
          fetch-depth: 1
      - name: Get Python 3.8
        uses: actions/setup-python@v5  # Atualizado de v2 para v5
        with:
          python-version: '3.8'
      - name: Configure pip cache
        uses: actions/cache@v4  # Atualizado de v2 para v4 para corrigir o erro
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py
      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "github-actions-bot@github.com"
          git config --global user.name "GitHub-Actions-Bot"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
